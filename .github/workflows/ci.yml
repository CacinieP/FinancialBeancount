name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dev dependencies
        run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check beancount_dedup/ tests/
      - name: Ruff format check
        run: ruff format --check beancount_dedup/ tests/
      - name: MyPy
        run: mypy beancount_dedup --ignore-missing-imports || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,xlsx,pdf]"
      - name: Run tests
        run: pytest tests/ --cov=beancount_dedup --cov-report=term-missing --cov-fail-under=55 -v
      - name: Run legacy tests
        run: python test_dedup.py

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build package
        run: |
          pip install build twine
          python -m build
      - name: Check package
        run: twine check dist/*
